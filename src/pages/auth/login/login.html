<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <form class="login-form" id="form">
            <h1>Food Store</h1>
            <h2>Iniciar Sesión</h2>

            <label for="email">Email:</label>
            <input 
                type="email"
                id="email"
                name="email"
                placeholder="unmail@mail.com"
                required>

            <label for="password">Contraseña:</label>
            <input 
                type="password"
                id="password"
                name="password"
                placeholder="Mínimo 8 caracteres"
                required>

            <button type="submit">INGRESAR</button>

            <p class="registro">
                ¿No tenés cuenta? <a href="../registro/registro.html">Registrate acá</a>
            </p>
        </form>
    </div>
    <script type="module" src="./login.ts"></script>
</body>
</html>
