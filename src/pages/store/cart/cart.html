<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store — Mi Carrito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./cart.css" />
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar__brand">
      <span class="navbar__logo">🍕</span>
      <span class="navbar__title">Food<strong>Store</strong></span>
    </div>
    <a href="../home/home.html" class="back-btn">
      ← Seguir comprando
    </a>
    <button id="logoutButton" class="logout-btn">Salir</button>
  </header>

  <!-- CONTENIDO -->
  <div class="cart-layout">

    <div class="cart-main">
      <h1 class="cart-title">Mi carrito</h1>

      <!-- EMPTY STATE -->
      <div class="empty-state" id="emptyCart" style="display: none;">
        <span class="empty-state__icon">🛒</span>
        <h3 class="empty-state__title">Tu carrito está vacío</h3>
        <p class="empty-state__text">Todavía no agregaste ningún producto.</p>
        <a href="../home/home.html" class="empty-state__btn">Ver catálogo</a>
      </div>

      <!-- LISTA DE ITEMS -->
      <div class="cart-list" id="cartList">
        <!-- Se renderizan dinámicamente -->
      </div>
    </div>

    <!-- RESUMEN -->
    <aside class="cart-summary" id="cartSummary">
      <h2 class="summary__title">Resumen</h2>
      <div class="summary__row">
        <span>Subtotal</span>
        <span id="cartSubtotal">$0</span>
      </div>
      <div class="summary__divider"></div>
      <div class="summary__row summary__row--total">
        <span>Total</span>
        <span id="cartTotal">$0</span>
      </div>
    </aside>

  </div>

  <script type="module" src="./cart.ts"></script>
</body>

</html>
